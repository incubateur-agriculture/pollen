name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all apps
        run: npm run build:all

      - name: Generate root index.html
        run: |
          cat > dist/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="fr">
            <head>
              <meta charset="UTF-8" />
              <title>Pollen — Widgets Grist</title>
              <style>
                body { font-family: system-ui, sans-serif; max-width: 640px; margin: 4rem auto; padding: 0 1rem; }
                h1 { color: #000091; }
                ul { line-height: 1.8; }
              </style>
            </head>
            <body>
              <h1>Pollen — Widgets Grist</h1>
              <ul>
                <li><a href="./intra-produit-hero/">intra-produit-hero</a></li>
                <li><a href="./intra-bdc-liste/">intra-bdc-liste</a></li>
                <li><a href="./intra-bdc-infos/">intra-bdc-infos</a></li>
                <li><a href="./intra-produit-selecteur/">intra-produit-selecteur</a></li>
              </ul>
            </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
